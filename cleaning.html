<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleaning Schedule — PrattHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#10101a;--bg3:#141420;
  --card:#181824;--card2:#1e1e2e;--card-hover:#242438;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.08);--border3:rgba(255,255,255,0.12);
  --text:#e8e8ef;--text2:#c0c0d0;--text-dim:#6a6a82;--text-faint:#4a4a60;
  --purple:#c084fc;--purple-glow:rgba(192,132,252,0.12);--purple-soft:rgba(192,132,252,0.08);
  --green:#4ade80;--danger:#ff5c5c;--orange:#fb923c;--blue:#60a5fa;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --radius:14px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 30% 10%,rgba(192,132,252,0.03) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 90%,rgba(99,180,255,0.02) 0%,transparent 70%);pointer-events:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--purple)!important;box-shadow:0 0 0 3px var(--purple-soft)}
::placeholder{color:var(--text-faint)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
@keyframes shimmer{0%{opacity:0.4}50%{opacity:0.7}100%{opacity:0.4}}

/* Header */
.header{background:linear-gradient(180deg,rgba(192,132,252,0.06) 0%,var(--bg) 100%);padding:16px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:900px;margin:0 auto;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.back-link{color:var(--text-dim);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:var(--purple)}
.header-center{text-align:center}
.header-logo{font-size:20px;font-weight:900;letter-spacing:2px;color:var(--text)}
.header-logo span{color:var(--purple)}
.header-sub{font-size:11px;color:var(--text-dim);margin-top:1px;text-align:center}
.sync-badge{font-size:11px;color:var(--green);background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:20px;padding:3px 10px;font-weight:600}
.content{max-width:900px;margin:0 auto;padding:20px 24px}

/* Tabs */
.view-tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:20px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);background:transparent;color:var(--text-dim);transition:all 0.2s;white-space:nowrap}
.tab-btn.active{background:var(--purple);color:#0a0a0f}

/* Calendar grid */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;font-size:18px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.cal-nav-btn:hover{background:var(--card2);color:var(--text)}
.cal-title{font-size:18px;font-weight:800;letter-spacing:-0.3px}
.cal-today-btn{font-size:11px;color:var(--text-dim);background:none;border:1px solid var(--border);border-radius:8px;padding:4px 12px;cursor:pointer;font-weight:600;margin-left:10px}
.cal-today-btn:hover{background:var(--card)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;padding:6px 0}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;background:var(--card);border:1px solid transparent;position:relative;min-height:48px}
.cal-cell:hover{border-color:var(--border3)}
.cal-cell.empty{background:transparent;cursor:default;border:none}
.cal-cell.today{border-color:var(--purple);box-shadow:0 0 0 1px var(--purple)}
.cal-cell.selected{background:var(--purple);border-color:var(--purple)}
.cal-cell.selected .cal-day{color:#0a0a0f}
.cal-cell.selected .cal-dot-row{opacity:0}
.cal-cell.selected .cal-count{color:rgba(0,0,0,0.5)}
.cal-cell.rest{opacity:0.3}
.cal-day{font-size:14px;font-weight:700;color:var(--text)}
.cal-count{font-size:9px;color:var(--text-dim);margin-top:1px}
.cal-dot-row{display:flex;gap:2px;margin-top:2px}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-dot.none{background:var(--border)}
.cal-dot.partial{background:var(--orange)}
.cal-dot.done{background:var(--green)}

/* Progress bar */
.progress-wrap{margin-bottom:20px}
.progress-bar-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:99px;background:var(--purple);transition:width 0.5s ease}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-top:6px}

/* Task groups */
.task-group{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;animation:fadeIn 0.3s ease both}
.task-group-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background 0.15s}
.task-group-header:hover{background:rgba(255,255,255,0.02)}
.task-group-check{width:24px;height:24px;min-width:24px;border-radius:8px;border:2px solid var(--border3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--purple);transition:all 0.2s;background:transparent}
.task-group-check.done{background:var(--purple);border-color:var(--purple);color:#0a0a0f}
.task-group-check.partial{background:var(--purple-soft);border-color:var(--purple)}
.task-group-body{flex:1}
.task-group-name{font-size:14px;font-weight:700}
.task-group-rooms{font-size:12px;color:var(--text-dim);margin-top:2px}
.task-group-rooms span{display:inline-flex;align-items:center;gap:3px;margin-right:8px}
.task-group-meta{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.task-group-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.task-group-count{font-size:11px;color:var(--text-dim);font-weight:600}
.freq-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px}
.freq-daily{background:rgba(251,146,60,0.12);color:#fb923c}
.freq-eod{background:rgba(96,165,250,0.12);color:#60a5fa}
.freq-weekly{background:var(--purple-soft);color:var(--purple)}
.freq-biweekly{background:rgba(45,212,191,0.12);color:#2dd4bf}
.freq-monthly{background:rgba(251,191,36,0.12);color:#fbbf24}
.freq-quarterly{background:rgba(248,113,113,0.12);color:#f87171}

/* Expandable sub-tasks */
.task-sub-list{display:none;border-top:1px solid var(--border);padding:4px 0}
.task-sub-list.open{display:block}
.task-sub{display:flex;align-items:center;gap:10px;padding:10px 16px 10px 52px;transition:background 0.1s;cursor:pointer}
.task-sub:hover{background:rgba(255,255,255,0.02)}
.task-sub.done{opacity:0.35}
.task-sub.done .task-sub-name{text-decoration:line-through;color:var(--text-dim)}
.task-sub-check{width:18px;height:18px;min-width:18px;border-radius:6px;border:2px solid var(--border3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--green);transition:all 0.2s}
.task-sub-check.done{background:var(--green);border-color:var(--green);color:#0a0a0f}
.task-sub-name{font-size:13px;font-weight:500}
.task-sub-room{font-size:11px;color:var(--text-dim)}
.task-sub-note{font-size:11px;color:var(--text-faint);font-style:italic}

/* Trash banner */
.trash-banner{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.trash-icon{font-size:22px}
.trash-info{flex:1}
.trash-title{font-size:13px;font-weight:700}
.trash-detail{font-size:11px;color:var(--text-dim);margin-top:1px}
.trash-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px}
.trash-yes{background:rgba(74,222,128,0.12);color:var(--green)}
.trash-no{background:rgba(255,255,255,0.05);color:var(--text-faint)}

/* Summary */
.summary-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.summary-pill{flex:1;min-width:80px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.summary-num{font-size:22px;font-weight:800;color:var(--purple)}
.summary-label{font-size:9px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* Week detail */
.week-day-section{margin-bottom:12px}
.week-day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s;margin-bottom:4px}
.week-day-header:hover{border-color:var(--border3)}
.week-day-header.today-hdr{border-color:var(--purple)}
.week-day-label{font-size:14px;font-weight:700}
.week-day-stats{display:flex;gap:8px;align-items:center}
.week-day-pct{font-size:12px;font-weight:700;color:var(--purple)}
.week-day-bar{width:60px;height:4px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.week-day-bar-fill{height:100%;border-radius:99px;background:var(--purple)}

/* Add form */
.add-form{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:20px}
.add-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.add-input{flex:1;min-width:180px;padding:11px 14px;border-radius:12px;border:1px solid var(--border);font-size:14px;color:var(--text);font-family:var(--font);background:var(--bg2)}
.add-sel{padding:11px 10px;border-radius:12px;border:1px solid var(--border);font-size:13px;color:var(--text);font-family:var(--font);background:var(--bg2);cursor:pointer;-webkit-appearance:auto;appearance:auto;flex:1}
.btn{border:none;border-radius:12px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;transition:all 0.25s}
.btn-primary{background:var(--purple);color:#0a0a0f}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,132,252,0.3)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:10px}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}

/* All tasks */
.all-room{margin-bottom:16px}
.all-room-title{font-size:15px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.all-task-item{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:4px;transition:all 0.15s}
.all-task-top{display:flex;align-items:center;gap:10px}
.all-task-body{flex:1}
.all-task-name{font-size:13px;font-weight:600}
.all-task-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.all-task-actions{display:flex;gap:4px;flex-shrink:0}
.all-task-btn{background:none;border:none;cursor:pointer;font-size:13px;opacity:0.35;padding:6px;transition:opacity 0.15s}
.all-task-btn:hover{opacity:0.85}
.task-edit-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);animation:fadeIn 0.2s ease}
.task-edit-row select{padding:8px 8px;border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--text);font-family:var(--font);background:var(--bg2);cursor:pointer;-webkit-appearance:auto;appearance:auto;flex:1;min-width:90px}
.task-edit-row input{padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--text);font-family:var(--font);background:var(--bg2);flex:2;min-width:120px}
.task-edit-btns{display:flex;gap:6px;margin-top:8px}
.btn-save-edit{padding:7px 16px;border-radius:8px;border:none;background:var(--purple);color:#0a0a0f;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-cancel-edit{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}

/* Empty / Toast */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--purple);color:#0a0a0f;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:700;z-index:2000;box-shadow:0 8px 30px rgba(192,132,252,0.3);animation:toastIn 0.3s ease}
.skeleton{animation:shimmer 1.5s infinite}.skel-bar{height:52px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:8px}

@media(max-width:600px){
  .header{padding:14px 16px}.header h1{font-size:18px}.content{padding:16px}
  .add-row{flex-direction:column}.cal-cell{min-height:40px}.cal-day{font-size:12px}
  .summary-pill{min-width:60px;padding:8px}.summary-num{font-size:18px}
}
</style>
</head>

];

let allTasks=[],completions={},synced=false,currentView="day",selectedDate=todayStr(),viewMonth=new Date().getMonth(),viewYear=new Date().getFullYear(),expandedGroups={},toastMsg=null,toastTimer=null;

function todayStr(){return new Date().toLocaleDateString("en-CA")}
function getDayName(ds){return DAYS[new Date(ds+"T12:00:00").getDay()]}
function getMonthWeek(ds){return Math.ceil(new Date(ds+"T12:00:00").getDate()/7)}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fd(y,m){return new Date(y,m,1).getDay()}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function isTaskDueOnDate(task,dateStr){
  const dayName=getDayName(dateStr);if(dayName==="sunday")return false;
  const freq=task.freq,d=new Date(dateStr+"T12:00:00");
  if(freq==="daily")return true;
  if(freq==="eod"){const s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)%2===0;}
  if(freq==="weekly")return task.day===dayName;
  if(freq==="biweekly"){if(task.day!==dayName)return false;const j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay())/7)%2===0;}
  if(freq==="monthly"){if(task.day!==dayName)return false;return getMonthWeek(dateStr)===(task.monthWeek||1);}
  if(freq==="quarterly"){if(task.day!==dayName)return false;return(d.getMonth()%3===0)&&getMonthWeek(dateStr)===(task.monthWeek||1);}
  return false;
}
function getTasksForDate(ds){return allTasks.filter(t=>isTaskDueOnDate(t,ds))}
function isTaskDone(id,ds){return!!completions[ds]?.[id]}
function toast(m){toastMsg=m;render();clearTimeout(toastTimer);toastTimer=setTimeout(()=>{toastMsg=null;render()},2500)}

const SEED_VERSION = 3;

function initFirebase(){
  db.ref("cleaning/seedVersion").once("value", snap => {
    const v = snap.val();
    if (!v || v < SEED_VERSION) {
      const obj = {};
      SEED_TASKS.forEach(t => { obj[t.id] = t; });
      db.ref("cleaning/tasks").set(obj);
      db.ref("cleaning/seedVersion").set(SEED_VERSION);
    }
  });
  db.ref("cleaning/tasks").on("value",snap=>{const v=snap.val();if(v){allTasks=Object.values(v)}synced=true;render()});
  db.ref("cleaning/completions").on("value",snap=>{completions=snap.val()||{};render()});
}

// ── FIXED: renamed to fbToggleTask to avoid self-referencing loop with window.toggleTask ──
function fbToggleTask(id, ds) {
  const p = `cleaning/completions/${ds}/${id}`;
  if (isTaskDone(id, ds)) db.ref(p).remove();
  else db.ref(p).set(true);
}

function addTask(t){const id="t_"+Date.now();db.ref(`cleaning/tasks/${id}`).set({...t,id});toast("Task added!")}
function updateTask(id,changes){db.ref(`cleaning/tasks/${id}`).update(changes);toast("Task updated!")}
function deleteTask(id){db.ref(`cleaning/tasks/${id}`).remove();toast("Task removed")}

let editingTaskId = null;

function groupTasks(tasks,ds){
  const groups={};
  tasks.forEach(t=>{
    const key=t.name.toLowerCase().replace(/[^a-z0-9]/g,"")+"|"+t.freq;
    if(!groups[key])groups[key]={name:t.name,tasks:[],freq:t.freq,assign:t.assign,note:t.note};
    groups[key].tasks.push(t);
  });
  return Object.values(groups).map(g=>{
    const doneCount=g.tasks.filter(t=>isTaskDone(t.id,ds)).length;
    return{...g,doneCount,total:g.tasks.length,allDone:doneCount===g.tasks.length,someDone:doneCount>0&&doneCount<g.tasks.length};
  });
}

function render(){
  const app=document.getElementById("app");
  if(!synced){app.innerHTML=`<div class="header"><div class="header-inner"><div class="header-top"><a href="./index.html" class="back-link">← Pratt Hub</a><div class="header-center"><div class="header-logo">🧹 CLEANING <span>SCHEDULE</span></div></div><span class="sync-badge">🔴 Live</span></div></div></div><div class="content"><div class="skeleton"><div class="skel-bar"></div><div class="skel-bar"></div><div class="skel-bar"></div></div></div>`;return;}
  const todayTasks=getTasksForDate(selectedDate);
  const doneTasks=todayTasks.filter(t=>isTaskDone(t.id,selectedDate));
  const pct=todayTasks.length?Math.round(doneTasks.length/todayTasks.length*100):0;
  const dayName=getDayName(selectedDate);
  const d=new Date(selectedDate+"T12:00:00");

  app.innerHTML=`
    ${toastMsg?`<div class="toast">${esc(toastMsg)}</div>`:""}
    <div class="header"><div class="header-inner">
      <div class="header-top">
        <a href="./index.html" class="back-link">← Pratt Hub</a>
        <div class="header-center">
          <div class="header-logo">🧹 CLEANING <span>SCHEDULE</span></div>
          <div class="header-sub">${d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        </div>
        <span class="sync-badge">🔴 Live</span>
      </div>
    </div></div>
    <div class="content">
      <div class="view-tabs">
        <button class="tab-btn${currentView==="day"?" active":""}" onclick="setView('day')">📋 Day</button>
        <button class="tab-btn${currentView==="week"?" active":""}" onclick="setView('week')">🗓 Week</button>
        <button class="tab-btn${currentView==="month"?" active":""}" onclick="setView('month')">📅 Month</button>
        <button class="tab-btn${currentView==="all"?" active":""}" onclick="setView('all')">📂 All</button>
        <button class="tab-btn${currentView==="add"?" active":""}" onclick="setView('add')">➕</button>
      </div>
      ${currentView==="day"?renderDay(todayTasks,doneTasks,pct,dayName):""}
      ${currentView==="week"?renderWeek():""}
      ${currentView==="month"?renderMonth():""}
      ${currentView==="all"?renderAll():""}
      ${currentView==="add"?renderAddForm():""}
    </div>`;
}

function renderCalGrid(year,month,selDate,onClickFn){
  const dIM=dim(year,month),fD=fd(year,month),today=todayStr();
  let html=`<div class="cal-nav">
    <button class="cal-nav-btn" onclick="${onClickFn}Prev()">‹</button>
    <div><span class="cal-title">${MONTHS[month]} ${year}</span><button class="cal-today-btn" onclick="${onClickFn}Today()">Today</button></div>
    <button class="cal-nav-btn" onclick="${onClickFn}Next()">›</button>
  </div><div class="cal-grid">`;
  DAY_SHORT.forEach(d=>{html+=`<div class="cal-hdr">${d}</div>`});
  for(let i=0;i<fD;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=dIM;day++){
    const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const dn=getDayName(ds),isT=ds===today,isSel=ds===selDate,isRest=dn==="sunday";
    const tasks=getTasksForDate(ds),done=tasks.filter(t=>isTaskDone(t.id,ds)).length;
    const dotClass=tasks.length===0?"none":done===tasks.length?"done":done>0?"partial":"none";
    html+=`<div class="cal-cell${isT?" today":""}${isSel?" selected":""}${isRest?" rest":""}" onclick="selectDate('${ds}')">
      <span class="cal-day">${day}</span>
      ${tasks.length>0?`<span class="cal-count">${done}/${tasks.length}</span>`:""}
      <div class="cal-dot-row"><div class="cal-dot ${dotClass}"></div></div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function renderDay(tasks,done,pct,dayName){
  if(dayName==="sunday")return`<div class="empty-state"><div class="icon">😌</div><h3>Rest Day</h3><p>Sundays are for rest — no cleaning tasks!</p></div>`;
  const isMon=dayName==="monday",isRecycling=isMon&&isRecyclingWeek(selectedDate);
  const trashHtml=isMon?`<div class="trash-banner"><div class="trash-icon">🗑️</div><div class="trash-info"><div class="trash-title">Monday Trash Day</div><div class="trash-detail">Compost + Trash${isRecycling?" · ♻️ Recycling this week!":""}</div></div><span class="trash-badge ${isRecycling?"trash-yes":"trash-no"}">${isRecycling?"♻️ Recycling":"No Recycling"}</span></div>`:"";
  const groups=groupTasks(tasks,selectedDate);
  if(!tasks.length)return`${trashHtml}<div class="empty-state"><div class="icon">✅</div><h3>Light day!</h3><p>No scheduled tasks.</p></div>`;

  const groupsHtml=groups.map(g=>{
    const gKey=g.name.toLowerCase().replace(/[^a-z0-9]/g,"")+"|"+g.freq;
    const isExpanded=expandedGroups[gKey];
    const isSingle=g.total===1;
    const checkClass=g.allDone?"done":g.someDone?"partial":"";
    const roomTags=g.tasks.map(t=>{const r=ROOM_MAP[t.room];return r?`<span>${r.emoji} ${r.label}</span>`:""}).join("");

    if(isSingle){
      const t=g.tasks[0],isDone=isTaskDone(t.id,selectedDate),r=ROOM_MAP[t.room]||{};
      // Single task: clicking anywhere on the row toggles it
      return`<div class="task-group"><div class="task-group-header" onclick="window.toggleTask('${t.id}','${selectedDate}')">
        <div class="task-group-check${isDone?" done":""}">${isDone?"✓":""}</div>
        <div class="task-group-body"><div class="task-group-name">${esc(t.name)}</div>
        <div class="task-group-rooms"><span>${r.emoji||""} ${r.label||""}</span></div>
        ${t.note?`<div style="font-size:11px;color:var(--text-faint);font-style:italic;margin-top:2px">${esc(t.note)}</div>`:""}
        <div class="task-group-meta"><span class="freq-badge freq-${t.freq}">${FREQ_LABELS[t.freq]}</span></div></div>
      </div></div>`;
    }

    // Multi-room group: header expands, sub-items toggle individually
    return`<div class="task-group">
      <div class="task-group-header" onclick="toggleGroup('${gKey}')">
        <div class="task-group-check ${checkClass}">${g.allDone?"✓":g.someDone?"–":""}</div>
        <div class="task-group-body"><div class="task-group-name">${esc(g.name)}</div>
        <div class="task-group-rooms">${roomTags}</div>
        <div class="task-group-meta"><span class="freq-badge freq-${g.freq}">${FREQ_LABELS[g.freq]}</span></div></div>
        <div class="task-group-right"><span class="task-group-count">${g.doneCount}/${g.total}</span><span style="color:var(--text-faint);font-size:14px">${isExpanded?"▴":"▾"}</span></div>
      </div>
      <div class="task-sub-list${isExpanded?" open":""}">
        ${g.tasks.map(t=>{const isDone=isTaskDone(t.id,selectedDate),r=ROOM_MAP[t.room]||{};
          return`<div class="task-sub${isDone?" done":""}" onclick="event.stopPropagation();window.toggleTask('${t.id}','${selectedDate}')">
            <div class="task-sub-check${isDone?" done":""}">${isDone?"✓":""}</div>
            <span class="task-sub-room">${r.emoji} ${r.label}</span>
            ${t.note?`<span class="task-sub-note">— ${esc(t.note)}</span>`:""}
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("");

  return`
    <div class="summary-row">
      <div class="summary-pill"><div class="summary-num">${tasks.length}</div><div class="summary-label">Tasks</div></div>
      <div class="summary-pill"><div class="summary-num">${done.length}</div><div class="summary-label">Done</div></div>
      <div class="summary-pill"><div class="summary-num">${pct}%</div><div class="summary-label">Complete</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="progress-label"><span>${done.length} of ${tasks.length}</span><span>${pct===100?"✨ All done!":""}</span></div></div>
    ${trashHtml}${groupsHtml}`;
}

function renderWeek(){
  const d=new Date(selectedDate+"T12:00:00"),dow=d.getDay();
  const sun=new Date(d);sun.setDate(d.getDate()-dow);
  const weekDates=Array.from({length:7},(_,i)=>{const dd=new Date(sun);dd.setDate(sun.getDate()+i);return dd.toLocaleDateString("en-CA")});
  const wkMonth=sun.getMonth(),wkYear=sun.getFullYear();

  let detailHtml="";
  weekDates.forEach(ds=>{
    const dn=getDayName(ds);if(dn==="sunday")return;
    const tasks=getTasksForDate(ds),done=tasks.filter(t=>isTaskDone(t.id,ds)).length;
    const pct=tasks.length?Math.round(done/tasks.length*100):0;
    const dd=new Date(ds+"T12:00:00"),isToday=ds===todayStr();
    detailHtml+=`<div class="week-day-section">
      <div class="week-day-header${isToday?" today-hdr":""}" onclick="selectDate('${ds}')">
        <span class="week-day-label">${DAY_SHORT[dd.getDay()]} ${dd.getDate()} ${isToday?"(Today)":""}</span>
        <div class="week-day-stats">
          <span class="week-day-pct">${tasks.length?pct+"%":"—"}</span>
          <div class="week-day-bar"><div class="week-day-bar-fill" style="width:${pct}%"></div></div>
          <span style="font-size:11px;color:var(--text-dim)">${done}/${tasks.length}</span>
        </div>
      </div>
    </div>`;
  });

  return renderCalGrid(wkYear,wkMonth,selectedDate,"wk")+detailHtml;
}

function renderMonth(){
  return renderCalGrid(viewYear,viewMonth,selectedDate,"mo");
}

function renderAll(){
  const dayOpts=`<option value="all">Any day</option><option value="monday">Monday</option><option value="tuesday">Tuesday</option><option value="wednesday">Wednesday</option><option value="thursday">Thursday</option><option value="friday">Friday</option><option value="saturday">Saturday</option>`;
  const freqOpts=Object.entries(FREQ_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join("");
  const assignOpts=`<option value="Both">Both</option><option value="Meagan">Meagan</option><option value="Sky">Sky</option>`;
  const mwOpts=`<option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option><option value="4">Week 4</option>`;

  let html="";
  ROOMS.forEach(room=>{
    const tasks=allTasks.filter(t=>t.room===room.id);if(!tasks.length)return;
    html+=`<div class="all-room"><div class="all-room-title">${room.emoji} ${room.label}</div>
    ${tasks.map(t=>{
      const isEditing = editingTaskId === t.id;
      const dayLabel = t.day&&t.day!=="all" ? t.day.charAt(0).toUpperCase()+t.day.slice(1) : "Any day";
      return`<div class="all-task-item"${isEditing?' style="border-color:var(--purple)"':''}>
        <div class="all-task-top">
          <div class="all-task-body"><div class="all-task-name">${esc(t.name)}</div>
          <div class="all-task-meta"><span class="freq-badge freq-${t.freq}">${FREQ_LABELS[t.freq]||t.freq}</span> · ${t.assign} · ${dayLabel}${t.note?" · "+esc(t.note):""}</div></div>
          <div class="all-task-actions">
            <button class="all-task-btn" onclick="event.stopPropagation();startEdit('${t.id}')" title="Edit">✏️</button>
            <button class="all-task-btn" onclick="event.stopPropagation();if(confirm('Delete this task?'))deleteTask('${t.id}')" title="Delete">🗑</button>
          </div>
        </div>
        ${isEditing?`
          <div class="task-edit-row">
            <select id="edit-day-${t.id}">${dayOpts.replace('value="'+t.day+'"','value="'+t.day+'" selected')}</select>
            <select id="edit-freq-${t.id}">${freqOpts.replace('value="'+t.freq+'"','value="'+t.freq+'" selected')}</select>
            <select id="edit-assign-${t.id}">${assignOpts.replace('value="'+t.assign+'"','value="'+t.assign+'" selected')}</select>
          </div>
          <div class="task-edit-row">
            <input id="edit-note-${t.id}" value="${esc(t.note||"")}" placeholder="Notes…" />
            <select id="edit-mw-${t.id}">${mwOpts.replace('value="'+(t.monthWeek||1)+'"','value="'+(t.monthWeek||1)+'" selected')}</select>
          </div>
          <div class="task-edit-btns">
            <button class="btn-save-edit" onclick="saveEdit('${t.id}')">Save</button>
            <button class="btn-cancel-edit" onclick="cancelEdit()">Cancel</button>
          </div>
        `:""}
      </div>`;
    }).join("")}</div>`;
  });
  return html||`<div class="empty-state"><div class="icon">📂</div><h3>No tasks</h3></div>`;
}

function renderAddForm(){
  return`<div class="add-form"><h3 style="font-size:16px;font-weight:800;margin-bottom:16px">➕ Add New Task</h3>
    <div class="add-row"><input class="add-input" id="addName" placeholder="Task name…" /></div>
    <div class="add-row">
      <select class="add-sel" id="addRoom">${ROOMS.map(r=>`<option value="${r.id}">${r.emoji} ${r.label}</option>`).join("")}</select>
      <select class="add-sel" id="addFreq">${Object.entries(FREQ_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join("")}</select>
    </div>
    <div class="add-row">
      <select class="add-sel" id="addDay"><option value="all">Any day</option><option value="monday">Monday</option><option value="tuesday">Tuesday</option><option value="wednesday">Wednesday</option><option value="thursday">Thursday</option><option value="friday">Friday</option><option value="saturday">Saturday</option></select>
      <select class="add-sel" id="addAssign"><option value="Both">Both</option><option value="Meagan">Meagan</option><option value="Sky">Sky</option></select>
    </div>
    <div class="add-row"><input class="add-input" id="addNote" placeholder="Notes (supplies, methods…)" /></div>
    <div class="add-row"><select class="add-sel" id="addMW"><option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option><option value="4">Week 4</option></select><span style="font-size:11px;color:var(--text-dim);align-self:center">For monthly/quarterly</span></div>
    <button class="btn btn-primary" onclick="submitNewTask()" style="width:100%;margin-top:8px">Add Task</button>
  </div>`;
}

// ── Global handlers ──
window.setView=v=>{currentView=v;render()};
window.selectDate=ds=>{selectedDate=ds;currentView="day";render()};

// FIXED: window.toggleTask calls fbToggleTask (not itself)
window.toggleTask=(id,ds)=>{ fbToggleTask(id,ds); };

window.deleteTask=deleteTask;
window.toggleGroup=key=>{expandedGroups[key]=!expandedGroups[key];render()};
window.startEdit=id=>{editingTaskId=id;render()};
window.cancelEdit=()=>{editingTaskId=null;render()};
window.saveEdit=id=>{
  const day=document.getElementById(`edit-day-${id}`)?.value||"all";
  const freq=document.getElementById(`edit-freq-${id}`)?.value||"weekly";
  const assign=document.getElementById(`edit-assign-${id}`)?.value||"Both";
  const note=document.getElementById(`edit-note-${id}`)?.value?.trim()||"";
  const monthWeek=parseInt(document.getElementById(`edit-mw-${id}`)?.value)||1;
  updateTask(id,{day,freq,assign,note,monthWeek});
  editingTaskId=null;
  render();
};

window.wkPrev=()=>{const d=new Date(selectedDate+"T12:00:00");d.setDate(d.getDate()-7);selectedDate=d.toLocaleDateString("en-CA");render()};
window.wkNext=()=>{const d=new Date(selectedDate+"T12:00:00");d.setDate(d.getDate()+7);selectedDate=d.toLocaleDateString("en-CA");render()};
window.wkToday=()=>{selectedDate=todayStr();render()};

window.moPrev=()=>{if(viewMonth===0){viewMonth=11;viewYear--}else viewMonth--;render()};
window.moNext=()=>{if(viewMonth===11){viewMonth=0;viewYear++}else viewMonth++;render()};
window.moToday=()=>{viewMonth=new Date().getMonth();viewYear=new Date().getFullYear();selectedDate=todayStr();render()};

window.submitNewTask=()=>{
  const name=document.getElementById("addName")?.value?.trim();if(!name)return toast("Enter a task name");
  addTask({room:document.getElementById("addRoom").value,name,freq:document.getElementById("addFreq").value,day:document.getElementById("addDay").value,assign:document.getElementById("addAssign").value,note:document.getElementById("addNote")?.value?.trim()||"",monthWeek:parseInt(document.getElementById("addMW").value)||1});
  document.getElementById("addName").value="";document.getElementById("addNote").value="";
};

initFirebase();
</script>
