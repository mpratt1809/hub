<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Family Cookbook — PrattHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#10101a;--card:#181824;--card2:#1e1e2e;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.08);--border3:rgba(255,255,255,0.12);
  --text:#e8e8ef;--text2:#c0c0d0;--text-dim:#6a6a82;--text-faint:#4a4a60;
  --orange:#ff7c43;--og:rgba(255,124,67,0.12);--os:rgba(255,124,67,0.08);
  --green:#4ade80;--danger:#ff5c5c;
  --fd:'Playfair Display',Georgia,serif;--f:'DM Sans',-apple-system,sans-serif;--r:16px;
}
body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 30% 10%,rgba(255,124,67,0.04) 0%,transparent 70%);pointer-events:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--orange)!important;box-shadow:0 0 0 3px var(--os)}
::placeholder{color:var(--text-faint)}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes ti{from{opacity:0;transform:translateY(16px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
@keyframes sh{0%,100%{opacity:0.4}50%{opacity:0.7}}
.hdr{background:linear-gradient(180deg,rgba(255,124,67,0.07) 0%,transparent 100%);padding:20px 24px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.hdr-in{max-width:1000px;margin:0 auto}
.hdr-top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.hdr-center{text-align:center;flex:1}
.hdr-logo{font-size:20px;font-weight:900;letter-spacing:2px;color:var(--text)}
.hdr-logo span{color:var(--orange)}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.logo{width:44px;height:44px;border-radius:14px;background:var(--og);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid rgba(255,124,67,0.2);flex-shrink:0}
.back{color:var(--text-dim);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;transition:color 0.2s;display:block}
.back:hover{color:var(--orange)}
.hdr-title{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:-0.3px}
.hdr-sub{font-size:12px;color:var(--text-dim);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px}
.sync{font-size:11px;color:var(--green);background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:20px;padding:3px 10px;font-weight:600}
.btn-add{background:var(--orange);color:#0a0a0f;border:none;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f);transition:all 0.2s}
.btn-add:hover{filter:brightness(1.1);transform:translateY(-1px)}
.ctrl{max-width:1000px;margin:0 auto;padding:20px 24px 0}
.sw{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:12px 16px;border:1px solid var(--border)}
.sw input{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);font-family:var(--f)}
.sc{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:16px;padding:4px}
.fr{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;align-items:center}
.cb{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--f);transition:all 0.2s}
.cb:hover{border-color:var(--border2);color:var(--text)}
.cb.on{background:var(--orange);color:#0a0a0f;border-color:var(--orange);font-weight:700}
.gfb{padding:7px 16px;border-radius:20px;border:1px solid rgba(74,222,128,0.25);background:transparent;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all 0.2s;white-space:nowrap}
.gfb.on{background:var(--green);color:#0a0a0f;border-color:var(--green)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;padding:20px 24px 0;max-width:1000px;margin:0 auto}
.rc{background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);transition:all 0.3s;cursor:pointer;animation:fi 0.4s ease both}
.rc:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.4);border-color:rgba(255,124,67,0.2)}
.ci{height:160px;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:40px}
.ci img{width:100%;height:100%;object-fit:cover}
.cb2{padding:16px 18px 18px}
.cc{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:6px}
.gfbadge{background:rgba(74,222,128,0.15);color:var(--green);font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px}
.ct{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--text);margin-top:6px;line-height:1.3}
.cd{font-size:13px;color:var(--text-dim);margin-top:6px;line-height:1.5}
.cm{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:12px;color:var(--text-dim);align-items:center}
.aby{background:var(--og);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;color:var(--orange)}
.dw{max-width:860px;margin:0 auto;padding:20px 24px 40px;animation:si 0.3s ease both}
.dtb{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.bbk{background:none;border:none;color:var(--text-dim);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);display:flex;align-items:center;gap:6px;padding:8px 0;transition:color 0.2s}
.bbk:hover{color:var(--text)}
.das{display:flex;gap:6px}
.bi{background:none;border:none;cursor:pointer;padding:8px 12px;border-radius:10px;color:var(--text-dim);font-size:14px;font-weight:500;font-family:var(--f);transition:all 0.2s}
.bi:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.bi.dng:hover{background:rgba(255,92,92,0.1);color:var(--danger)}
.dcat{font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px}
.dtitle{font-family:var(--fd);font-size:34px;font-weight:900;color:var(--text);margin-top:8px;line-height:1.1;letter-spacing:-1px}
.ddesc{font-size:16px;color:var(--text-dim);font-style:italic;margin-top:10px;line-height:1.6}
.dmeta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.mc{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--card);border-radius:20px;font-size:13px;color:var(--text2);border:1px solid var(--border);font-weight:500}
.dcols{display:grid;grid-template-columns:1fr 1.5fr;gap:32px;margin:28px 0 24px}
@media(max-width:700px){.dcols{grid-template-columns:1fr}}
.ip{background:var(--card);border-radius:var(--r);padding:24px;border:1px solid var(--border)}
.st{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px}
.ir{display:flex;gap:12px;font-size:14px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.ir:last-child{border-bottom:none}
.ia{font-weight:700;color:var(--orange);min-width:80px;text-align:right;flex-shrink:0}
.in2{color:var(--text2)}
.sl2{display:flex;flex-direction:column;gap:16px}
.si2{display:flex;gap:14px;font-size:15px;line-height:1.65;color:var(--text2)}
.sn{min-width:30px;height:30px;border-radius:50%;background:var(--orange);color:#0a0a0f;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-top:2px}
.nb{background:var(--card);padding:20px;border-radius:var(--r);border-left:3px solid var(--orange);font-size:14px;color:var(--text-dim);line-height:1.6;margin-bottom:24px}
.ps{margin-top:24px}
.pb{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--border);position:relative;max-width:400px}
.pb img{width:100%;max-height:280px;object-fit:cover;display:block}
.pct{padding:10px 14px;font-size:13px;color:var(--text2)}
.pd{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.65);border:none;color:#fff;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.pd:hover{background:rgba(255,92,92,0.7)}
.fw{max-width:760px;margin:0 auto;padding:20px 24px 40px;animation:si 0.3s ease both}
.fc{background:var(--card);border-radius:20px;padding:28px;border:1px solid var(--border)}
.fg{margin-bottom:18px}
.frow{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.frow .fg{flex:1;min-width:130px;margin-bottom:0}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.inp,.sel,.ta{width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--border);font-size:14px;color:var(--text);font-family:var(--f);background:var(--bg2);transition:border-color 0.2s}
.sel{cursor:pointer;-webkit-appearance:auto;appearance:auto}
.ta{resize:vertical;min-height:72px}
.irf{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.irf .inp:first-child{width:65px;flex:none}
.irf .sel{width:78px;flex:none}
.irf .inn{flex:1}
.srf{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.snb{min-width:28px;height:28px;border-radius:50%;background:var(--og);color:var(--orange);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-top:10px;flex-shrink:0}
.arb{background:none;border:1px dashed rgba(255,124,67,0.3);border-radius:12px;padding:8px 16px;font-size:13px;color:var(--orange);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;margin-top:4px;font-family:var(--f);transition:all 0.2s}
.arb:hover{border-color:var(--orange);background:var(--os)}
.rmb{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--danger);font-size:16px;line-height:1;flex-shrink:0}
.rmb:hover{background:rgba(255,92,92,0.1)}
.fa{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.bp{background:var(--orange);color:#0a0a0f;border:none;border-radius:12px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);transition:all 0.2s}
.bp:hover{filter:brightness(1.1);transform:translateY(-1px)}
.bs{background:var(--card2);color:var(--text2);border:1px solid var(--border2);border-radius:12px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all 0.2s}
.bs:hover{border-color:var(--border3)}
.gft{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;border:1px solid rgba(74,222,128,0.25);background:transparent;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all 0.25s}
.gft.on{background:var(--green);color:#0a0a0f;border-color:var(--green)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.md{background:var(--card2);border-radius:20px;padding:28px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.5);border:1px solid var(--border2)}
.md h3{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.md p{color:var(--text-dim);font-size:14px;margin-bottom:20px;line-height:1.5}
.mda{display:flex;gap:10px;justify-content:flex-end}
.es{text-align:center;padding:60px 20px;grid-column:1/-1}
.es .ic{font-size:48px;margin-bottom:12px}
.es h3{font-family:var(--fd);font-size:22px;color:var(--text);margin-bottom:6px}
.es p{color:var(--text-dim);font-size:14px}
.sk{animation:sh 1.5s infinite;background:var(--card);border:1px solid var(--border);border-radius:var(--r);height:260px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--orange);color:#0a0a0f;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:700;z-index:2000;box-shadow:0 8px 30px var(--og);animation:ti 0.3s ease;pointer-events:none}
@media(max-width:600px){.hdr{padding:14px 16px}.hdr-title{font-size:18px}.grid{grid-template-columns:1fr;padding:16px}.ctrl{padding:16px}.fc{padding:18px}.dtitle{font-size:26px}.dw,.fw{padding:14px 16px 32px}}
@media print{.hdr,.ctrl,.dtb,.ps,.fa{display:none!important}body{background:#fff;color:#222}.dw{padding:0;max-width:100%}.ip,.nb{background:#f8f8f8;border-color:#ddd}.sn{background:#333;color:#fff}.ia{color:#e05a20}}
</style>
</head>
<body>
<div id="hm"></div>
<div id="tm"></div>
<div id="am"></div>
<div class="mo" id="delmo" style="display:none" onclick="if(event.target===this)closeDel()">
  <div class="md">
    <h3>Remove this recipe?</h3>
    <p>This can't be undone — it'll be permanently deleted from the family cookbook.</p>
    <div class="mda">
      <button class="bs" onclick="closeDel()">Keep It</button>
      <button class="bp" style="background:var(--danger)" onclick="confirmDel()">Remove</button>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyAx6LjPOQ-gMIOZ2ree3hUeNxXW9vbKvvg",authDomain:"pratt-cookbook.firebaseapp.com",databaseURL:"https://pratt-cookbook-default-rtdb.firebaseio.com",projectId:"pratt-cookbook",storageBucket:"pratt-cookbook.firebasestorage.app",messagingSenderId:"593099318400",appId:"1:593099318400:web:04af38d9d1d40d65007265"});
const db=firebase.database();
const CATS=["All Recipes","Breakfast","Lunch","Dinner","Healthy Desserts","Desserts","Snacks","Sauces","Beverages — Alcoholic","Beverages — Non-Alcoholic"];
const UNITS=["","tsp","tbsp","cup","oz","lb","g","kg","ml","L","pinch","dash","whole","slice","clove","can","bunch","pkg"];
const MEMBERS=["Sky","Meagan","Grandma","Grandpa","Mom","Dad","Custom"];
let recs=[],synced=false,view="grid",sq="",cf="All Recipes",gf=false,did=null,eid=null,dlid=null,tt=null;
db.ref("recipes").on("value",snap=>{const v=snap.val();recs=v?Object.values(v):[];synced=true;ra();});
const save=r=>db.ref("recipes/"+r.id).set(r);
const del=id=>db.ref("recipes/"+id).remove();
const uid=()=>Math.random().toString(36).slice(2,10);
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const getPhoto=r=>r.photo||(r.photos&&r.photos[0])||null;
const getPhotoCaption=r=>r.photoCaption||(r.photoMemories&&r.photoMemories[0]?.caption)||"A delicious memory";
const getPhotoDate=r=>r.photoDate||(r.photoMemories&&r.photoMemories[0]?.date)||"";
function toast(m){document.getElementById("tm").innerHTML=`<div class="toast">${esc(m)}</div>`;clearTimeout(tt);tt=setTimeout(()=>{document.getElementById("tm").innerHTML="";},2500);}
function ra(){rh();if(view==="grid")rg();else if(view==="detail")rd();else if(view==="form")rf();}
function rh(){document.getElementById("hm").innerHTML=`<div class="hdr"><div class="hdr-in"><div class="hdr-top"><a href="./index.html" class="back">← Pratt Hub</a><div class="hdr-center"><div class="hdr-logo">🍳 FAMILY <span>COOKBOOK</span></div><div class="hdr-sub">${recs.length} recipe${recs.length!==1?"s":""} and counting</div></div><div class="hdr-r"><span class="sync">${synced?"🔴 Live":"⏳ Syncing"}</span>${view==="grid"?`<button class="btn-add" onclick="openForm(null)">+ Add Recipe</button>`:""}</div></div></div></div>`;}
function rg(){
  const fil=recs.filter(r=>{const mc=cf==="All Recipes"||r.category===cf;const ms=!sq||r.title.toLowerCase().includes(sq.toLowerCase())||(r.ingredients||[]).some(i=>i.name.toLowerCase().includes(sq.toLowerCase()))||(r.addedBy||"").toLowerCase().includes(sq.toLowerCase());const mg=!gf||r.glutenFree;return mc&&ms&&mg;});
  const ctrl=`<div class="ctrl"><div class="sw"><span style="color:var(--text-dim)">🔍</span><input id="si" type="text" placeholder="Search recipes, ingredients, or family members…" value="${esc(sq)}"/>${sq?`<button class="sc" onclick="sq='';rg()">✕</button>`:""}</div><div class="fr">${CATS.map(c=>`<button class="cb${cf===c?" on":""}" onclick="cf='${esc(c)}';rg()">${esc(c)}</button>`).join("")}<button class="gfb${gf?" on":""}" onclick="gf=!gf;rg()">GF Gluten Free</button></div></div>`;
  let gh="";
  if(!synced){gh=`<div class="grid">${[1,2,3,4,5,6].map(()=>`<div class="sk"></div>`).join("")}</div>`;}
  else if(!fil.length){gh=`<div class="grid"><div class="es"><div class="ic">📖</div><h3>No recipes found</h3><p>${sq||gf?"Try adjusting your filters":"Add your first family recipe!"}</p></div></div>`;}
  else{gh=`<div class="grid">${fil.map((r,i)=>`<div class="rc" onclick="openDetail('${r.id}')" style="animation-delay:${i*0.05}s"><div class="ci">${getPhoto(r)?`<img src="${getPhoto(r)}" alt="${esc(r.title)}" onerror="this.parentElement.innerHTML='🍽️'"/>`:`🍽️`}</div><div class="cb2"><div class="cc">${esc(r.category)}${r.glutenFree?`<span class="gfbadge">GF</span>`:""}</div><div class="ct">${esc(r.title)}</div><div class="cd">${r.description?r.description.slice(0,80)+(r.description.length>80?"…":""):"A family favorite"}</div><div class="cm"><span>⏱ ${esc(r.prepTime||"—")}</span><span>🍽 Serves ${r.servings||"—"}</span>${r.addedBy?`<span class="aby">by ${esc(r.addedBy)}</span>`:""}</div></div></div>`).join("")}</div>`;}
  document.getElementById("am").innerHTML=ctrl+gh;
  document.getElementById("si")?.addEventListener("input",e=>{sq=e.target.value;rg();});
}
function rd(){
  const r=recs.find(x=>x.id===did);if(!r){view="grid";ra();return;}
  const ph=getPhoto(r);const phCap=getPhotoCaption(r);const phDate=getPhotoDate(r);
  document.getElementById("am").innerHTML=`<div class="dw"><div class="dtb"><button class="bbk" onclick="goGrid()">← Back</button><div class="das"><button class="bi" onclick="printR('${r.id}')">🖨️ Print</button><button class="bi" onclick="openForm('${r.id}')">✏️ Edit</button><button class="bi dng" onclick="openDel('${r.id}')">🗑️ Delete</button></div></div><div><div class="dcat">${esc(r.category)}${r.glutenFree?`<span class="gfbadge" style="margin-left:8px">GF</span>`:""}</div><h1 class="dtitle">${esc(r.title)}</h1>${r.description?`<p class="ddesc">${esc(r.description)}</p>`:""}<div class="dmeta">${r.prepTime?`<span class="mc">⏱ Prep: ${esc(r.prepTime)}</span>`:""}${r.cookTime?`<span class="mc">🔥 Cook: ${esc(r.cookTime)}</span>`:""}${r.servings?`<span class="mc">🍽 Serves ${r.servings}</span>`:""}${r.addedBy?`<span class="mc">❤️ by ${esc(r.addedBy)}</span>`:""}</div></div><div class="dcols"><div class="ip"><div class="st">Ingredients</div>${(r.ingredients||[]).map(i=>`<div class="ir"><span class="ia">${esc(i.amount)} ${esc(i.unit)}</span><span class="in2">${esc(i.name)}</span></div>`).join("")}</div><div><div class="st">Instructions</div><div class="sl2">${(r.steps||[]).map((s,i)=>`<div class="si2"><span class="sn">${i+1}</span><span>${esc(s)}</span></div>`).join("")}</div></div></div>${r.notes?`<div class="nb"><strong style="color:var(--orange)">Family Notes:</strong> ${esc(r.notes)}</div>`:""}<div class="ps"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="st" style="margin-bottom:0">📸 Memory</div>${!ph?`<label class="btn-add" style="cursor:pointer;font-size:12px;padding:8px 14px">+ Add Photo<input type="file" accept="image/*" onchange="upPhoto(event,'${r.id}')" style="display:none"/></label>`:""}</div>${ph?`<div class="pb"><img src="${ph}" alt="${esc(r.title)}" onerror="this.style.display='none'"/><button class="pd" onclick="rmPhoto('${r.id}')">✕</button>${phCap?`<div class="pct">${esc(phCap)}</div>`:""}</div>`:``}<p style="color:var(--text-dim);font-style:italic;font-size:14px">${!ph?"No photo yet — snap a pic next time you make this!":""}</p></div></div>`;
}
function rf(){
  const r=eid?recs.find(x=>x.id===eid):null;
  const ings=r?.ingredients?.length?r.ingredients:[{id:uid(),name:"",amount:"",unit:""}];
  const steps=r?.steps?.length?r.steps:[""];
  const isC=r?.addedBy&&!["Sky","Meagan","Grandma","Grandpa","Mom","Dad",""].includes(r.addedBy);
  document.getElementById("am").innerHTML=`<div class="fw"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><button class="bbk" onclick="goGrid()">← Cancel</button><h2 style="font-family:var(--fd);font-size:20px;font-weight:700">${r?"Edit Recipe":"New Recipe"}</h2><div style="width:80px"></div></div><div class="fc"><div class="fg"><label class="lbl">Recipe Title *</label><input class="inp" id="ft" value="${esc(r?.title||"")}" placeholder="e.g. Grandma's Famous Pot Roast"/></div><div class="frow"><div class="fg"><label class="lbl">Category</label><select class="sel" id="fcat">${CATS.filter(c=>c!=="All Recipes").map(c=>`<option value="${c}"${r?.category===c?" selected":""}>${esc(c)}</option>`).join("")}</select></div><div class="fg"><label class="lbl">Added By</label><select class="sel" id="fab" onchange="document.getElementById('fcus').style.display=this.value==='Custom'?'block':'none'"><option value="">Select…</option>${MEMBERS.map(m=>`<option value="${m}"${r?.addedBy===m?" selected":isC&&m==="Custom"?" selected":""}>${m}</option>`).join("")}</select><input class="inp" id="fcus" value="${isC?esc(r.addedBy):""}" placeholder="Enter name…" style="margin-top:8px;display:${isC?"block":"none"}"/></div></div><div class="fg"><label class="lbl">Description</label><textarea class="ta" id="fd" rows="3" placeholder="The story behind this recipe…">${esc(r?.description||"")}</textarea></div><div class="frow"><div class="fg"><label class="lbl">Prep Time</label><input class="inp" id="fp" value="${esc(r?.prepTime||"")}" placeholder="e.g. 15 min"/></div><div class="fg"><label class="lbl">Cook Time</label><input class="inp" id="fck" value="${esc(r?.cookTime||"")}" placeholder="e.g. 45 min"/></div><div class="fg"><label class="lbl">Servings</label><input class="inp" id="fsv" type="number" value="${r?.servings||4}"/></div></div><div class="fg"><label class="lbl">Dietary</label><button type="button" class="gft${r?.glutenFree?" on":""}" id="gft" onclick="this.classList.toggle('on');this.textContent=this.classList.contains('on')?'GF Gluten Free ✓':'GF Gluten Free'">${r?.glutenFree?"GF Gluten Free ✓":"GF Gluten Free"}</button></div><div class="fg"><label class="lbl">Ingredients</label><div id="il">${ings.map(ing=>`<div class="irf"><input class="inp" data-a value="${esc(ing.amount)}" placeholder="Amt" style="width:65px;flex:none"/><select class="sel" data-u style="width:78px;flex:none">${UNITS.map(u=>`<option value="${u}"${ing.unit===u?" selected":""}>${u||"—"}</option>`).join("")}</select><input class="inp inn" data-n value="${esc(ing.name)}" placeholder="Ingredient"/><button class="rmb" onclick="this.parentElement.remove()">✕</button></div>`).join("")}</div><button class="arb" onclick="addI()">+ Add Ingredient</button></div><div class="fg"><label class="lbl">Instructions</label><div id="sl3">${steps.map((s,i)=>`<div class="srf"><span class="snb">${i+1}</span><textarea class="ta" data-s rows="2" style="flex:1" placeholder="Step ${i+1}…">${esc(s)}</textarea><button class="rmb" onclick="this.parentElement.remove()">✕</button></div>`).join("")}</div><button class="arb" onclick="addS()">+ Add Step</button></div><div class="fg"><label class="lbl">Family Notes / Tips</label><textarea class="ta" id="fn" rows="3" placeholder="Any special tips, substitutions, or stories…">${esc(r?.notes||"")}</textarea></div><div class="fa"><button class="bs" onclick="goGrid()">Cancel</button><button class="bp" onclick="subForm()">${r?"Save Changes":"Add to Cookbook"}</button></div></div></div>`;
}
function addI(){const l=document.getElementById("il");const d=document.createElement("div");d.className="irf";d.innerHTML=`<input class="inp" data-a placeholder="Amt" style="width:65px;flex:none"/><select class="sel" data-u style="width:78px;flex:none">${UNITS.map(u=>`<option value="${u}">${u||"—"}</option>`).join("")}</select><input class="inp inn" data-n placeholder="Ingredient"/><button class="rmb" onclick="this.parentElement.remove()">✕</button>`;l.appendChild(d);}
function addS(){const l=document.getElementById("sl3");const i=l.children.length+1;const d=document.createElement("div");d.className="srf";d.innerHTML=`<span class="snb">${i}</span><textarea class="ta" data-s rows="2" style="flex:1" placeholder="Step ${i}…"></textarea><button class="rmb" onclick="this.parentElement.remove()">✕</button>`;l.appendChild(d);}
function subForm(){
  const title=document.getElementById("ft")?.value.trim();if(!title){toast("Please enter a recipe title");return;}
  const ings=[];document.querySelectorAll("#il .irf").forEach(row=>{const name=row.querySelector("[data-n]")?.value.trim();if(!name)return;ings.push({id:uid(),name,amount:row.querySelector("[data-a]")?.value.trim()||"",unit:row.querySelector("[data-u]")?.value||""});});
  const steps=[];document.querySelectorAll("#sl3 [data-s]").forEach(ta=>{const v=ta.value.trim();if(v)steps.push(v);});
  const abr=document.getElementById("fab")?.value;const ab=abr==="Custom"?(document.getElementById("fcus")?.value.trim()||""):abr;
  const ex=eid?recs.find(x=>x.id===eid):null;
  const recipe={id:ex?.id||uid(),title,category:document.getElementById("fcat")?.value||"Dinner",description:document.getElementById("fd")?.value.trim()||"",prepTime:document.getElementById("fp")?.value.trim()||"",cookTime:document.getElementById("fck")?.value.trim()||"",servings:parseInt(document.getElementById("fsv")?.value)||4,glutenFree:document.getElementById("gft")?.classList.contains("on")||false,addedBy:ab,notes:document.getElementById("fn")?.value.trim()||"",ingredients:ings,steps,dateAdded:ex?.dateAdded||new Date().toISOString().slice(0,10),photo:ex?.photo||null,photoCaption:ex?.photoCaption||""};
  save(recipe);toast(eid?"Recipe updated!":"Recipe added!");goGrid();
}
function upPhoto(e,id){const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{const r=recs.find(x=>x.id===id);if(!r)return;r.photo=ev.target.result;save(r);toast("Photo saved!");rd2();};rd.readAsDataURL(f);}
function rmPhoto(id){const r=recs.find(x=>x.id===id);if(!r)return;r.photo=null;r.photoCaption="";save(r);rd2();}
function saveCap(id){const c=document.getElementById("cap")?.value.trim();if(!c)return;const r=recs.find(x=>x.id===id);if(!r)return;r.photoCaption=c;save(r);toast("Caption saved!");rd2();}
function rd2(){rd();}
function printR(id){const r=recs.find(x=>x.id===id);if(!r)return;const w=window.open("","_blank");if(!w)return;w.document.write(`<!DOCTYPE html><html><head><title>${r.title}</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;padding:40px;max-width:700px;margin:0 auto;color:#222}h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;margin-bottom:6px}.meta{color:#888;font-size:13px;margin-bottom:16px;border-bottom:2px solid #eee;padding-bottom:12px}.desc{font-style:italic;color:#666;margin-bottom:20px;font-size:15px}h2{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin:20px 0 10px}.ing{display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:14px}.amt{font-weight:700;text-align:right;color:#e05a20}ol{padding-left:20px}ol li{margin-bottom:8px;font-size:14px;line-height:1.6}.notes{background:#f8f8f8;padding:16px;border-radius:8px;margin-top:20px;font-size:13px;border-left:3px solid #ff7c43}.footer{margin-top:30px;font-size:12px;color:#999;text-align:center;border-top:1px solid #eee;padding-top:12px}</style></head><body><h1>${r.title}</h1><div class="meta">${r.category} · Serves ${r.servings} · Prep: ${r.prepTime} · Cook: ${r.cookTime}${r.addedBy?` · by ${r.addedBy}`:""}</div>${r.description?`<div class="desc">${r.description}</div>`:""}<h2>Ingredients</h2><div class="ing">${(r.ingredients||[]).map(i=>`<span class="amt">${i.amount} ${i.unit}</span><span>${i.name}</span>`).join("")}</div><h2>Instructions</h2><ol>${(r.steps||[]).map(s=>`<li>${s}</li>`).join("")}</ol>${r.notes?`<div class="notes"><strong>Notes:</strong> ${r.notes}</div>`:""}<div class="footer">Pratt Family Cookbook · ${r.dateAdded}</div></body></html>`);w.document.close();w.print();}
function openDel(id){dlid=id;document.getElementById("delmo").style.display="flex";document.body.style.overflow="hidden";}
function closeDel(){document.getElementById("delmo").style.display="none";document.body.style.overflow="";dlid=null;}
function confirmDel(){if(!dlid)return;del(dlid);closeDel();toast("Recipe removed");goGrid();}
function openDetail(id){did=id;eid=null;view="detail";ra();}
function openForm(id){eid=id;view="form";ra();}
function goGrid(){view="grid";did=null;eid=null;ra();}
ra();
</script>
</body>
</html>
