<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Our Family Calendar 🏡</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', Georgia, sans-serif; background: #0a0a0f; color: #e8e8ef; min-height: 100vh; } :root { --blue: #47c8ff; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; }
.loading-icon { font-size: 42px; }
.loading-text { font-size: 15px; color: #6a6a82; }
.back-link { display: inline-flex; align-items: center; gap: 4px; color: #6a6a82; text-decoration: none; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; margin-bottom: 6px; transition: color 0.2s; }
.back-link:hover { color: #ffaa64; }
.header { background: linear-gradient(180deg,rgba(71,200,255,0.07) 0%,transparent 100%); padding: 16px 24px; border-bottom: 1px solid rgba(71,200,255,0.1); backdrop-filter: blur(20px); }
.header-top-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
.header-center { text-align: center; flex: 1; }
.header-logo { font-size: 20px; font-weight: 900; letter-spacing: 2px; color: #e8e8ef; }
.header-logo span { color: #47c8ff; }
.header-sub { color: #6a6a82; font-size: 11px; margin-top: 2px; text-align: center; }
.header-members { display: none; }
.header-title { display: none; }
.header-bottom-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.sync-badge { font-size: 11px; color: #4ade80; background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.25); border-radius: 20px; padding: 3px 10px; font-weight: 600; white-space: nowrap; }
.view-tabs { display: flex; gap: 4px; flex: 1; }
.tab-btn { background: rgba(255,255,255,0.06); color: #e8e8ef; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 6px 10px; font-size: 11px; font-weight: 400; transition: all 0.15s; white-space: nowrap; }
.tab-btn.active { background: #47c8ff; color: #e8e8ef; font-weight: 700; }
.tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }
.btn-add { background: #47c8ff; color: #e8e8ef; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 700; transition: opacity 0.15s; white-space: nowrap; }
.btn-add:hover { opacity: 0.88; }
.filter-bar { background: #10101a; padding: 8px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filter-label { color: #c0c0d0; font-size: 10px; letter-spacing: 2px; }
.fsel { background: #0d0d14; color: #e8e8ef; border: 1px solid rgba(255,255,255,0.06); border-radius: 7px; padding: 5px 9px; font-size: 11px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 13px 24px 6px; }
.nav-btn { background: #0d0d14; border: 1px solid rgba(255,255,255,0.1); border-radius: 9px; width: 36px; height: 36px; font-size: 20px; color: #e8e8ef; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.nav-btn:hover { background: #141420; }
.nav-center { display: flex; align-items: center; gap: 10px; }
.nav-label { font-size: 20px; font-weight: 700; font-family: 'Playfair Display', Georgia, serif; cursor: pointer; border-bottom: 2px dashed #c9a96e; padding-bottom: 1px; }
.nav-label:hover { color: #c9a96e; }
.btn-today { font-size: 10px; color: #6a6a82; background: none; border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; padding: 3px 9px; }
.btn-today:hover { background: #141420; }
.jump-picker { display: flex; gap: 8px; align-items: center; background: #0d0d14; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 6px 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.jump-picker select { border: 1px solid rgba(255,255,255,0.06); border-radius: 7px; padding: 5px 8px; font-size: 13px; background: #181824; outline: none; }
.jump-picker select:focus { border-color: #c9a96e; }
.jump-go { background: #10101a; color: #e8e8ef; border: none; border-radius: 7px; padding: 6px 14px; font-size: 12px; font-weight: 700; }
.jump-cancel { background: none; border: none; font-size: 18px; color: #6a6a82; padding: 0 4px; }
.month-wrap { padding: 4px 8px 20px; overflow: hidden; }
.day-headers { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 2px; margin-bottom: 2px; }
.day-hdr { text-align: center; font-size: 10px; font-weight: 700; color: #6a6a82; letter-spacing: 1px; padding: 5px 0; text-transform: uppercase; }
.month-grid { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 2px; }
.day-cell { min-height: 84px; border-radius: 10px; padding: 6px; cursor: pointer; transition: all 0.12s; background: rgba(71,200,255,0.04); border: 1px solid rgba(71,200,255,0.12); }
.day-cell.empty { background: transparent; border: none; cursor: default; }
.day-cell.today { background: rgba(71,200,255,0.08); border-color: rgba(71,200,255,0.4); box-shadow: 0 2px 10px rgba(26,26,46,0.18); }
.day-cell.selected { background: rgba(71,200,255,0.12); border: 2px solid #47c8ff; }
.day-cell:hover:not(.empty):not(.today):not(.selected) { background: rgba(71,200,255,0.07); }
.day-num { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.today .day-num { color: #e8e8ef; }
.ev-pill { font-size: 9px; color: #fff; border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; transition: opacity 0.12s; }
.ev-pill.multiday-start { border-radius: 4px 0 0 4px; margin-right: 0; }
.ev-pill.multiday-mid   { border-radius: 0; margin-left: 1px; margin-right: 0; opacity: 0.85; }
.ev-pill.multiday-end   { border-radius: 0 4px 4px 0; margin-left: 1px; }
.ev-location { font-size: 10px; color: #6a6a82; margin-top: 2px; display: flex; align-items: center; gap: 3px; }
.recur-choice { background: #1818248f0; border: 1px solid rgba(71,200,255,0.15); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
.recur-choice-title { font-size: 12px; font-weight: 700; color: #92400e; margin-bottom: 8px; }
.recur-choice-btn { display: block; width: 100%; text-align: left; padding: 8px 12px; border-radius: 7px; border: 1px solid rgba(71,200,255,0.15); background: #0d0d14; margin-bottom: 5px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
.recur-choice-btn:last-child { margin-bottom: 0; }
.recur-choice-btn:hover { background: rgba(71,200,255,0.08); }
.ev-pill:hover { opacity: 0.82; }
.ev-more { font-size: 9px; color: #6a6a82; }
.day-panel { margin-top: 12px; background: #0d0d14; border-radius: 14px; border: 1px solid rgba(71,200,255,0.1); padding: 16px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
.day-three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:0 16px 24px;align-items:start}
.day-col{display:flex;flex-direction:column;gap:12px}
.day-panel{margin-top:0!important}
.tasks-section,.notes-section{margin:0!important}
@media(max-width:768px){.day-three-col{grid-template-columns:1fr}}
.day-panel-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.day-panel-title { font-weight: 700; font-size: 15px; }
.day-panel-empty { color: #6a6a82; font-size: 13px; }
.btn-add-sm { background: #10101a; color: #e8e8ef; border: none; border-radius: 8px; padding: 5px 13px; font-size: 12px; }
.btn-add-sm:hover { opacity: 0.88; }
.ev-card { border-radius: 10px; padding: 10px 13px; margin-bottom: 7px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; transition: opacity 0.12s; }
.ev-card:hover { opacity: 0.88; }
.ev-card-body { flex: 1; }
.ev-card-title { font-weight: 700; font-size: 13px; }
.ev-card-meta { font-size: 11px; color: #6a6a82; margin-top: 2px; }
.ev-card-notes { font-size: 11px; color: #6a6a82; margin-top: 3px; }
.ev-edit-badge { font-size: 10px; font-weight: 700; border-radius: 5px; padding: 2px 7px; white-space: nowrap; align-self: flex-start; flex-shrink: 0; margin-left: 8px; }
.week-wrap { padding: 10px 8px 24px; overflow: hidden; }
.week-grid { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 4px; margin-bottom: 12px; }
.week-cell { border-radius: 12px; cursor: pointer; min-height: 140px; padding: 10px 8px; transition: all 0.12s; background: rgba(71,200,255,0.04); border: 1px solid rgba(71,200,255,0.12); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.week-cell.today { background: rgba(71,200,255,0.08); border-color: rgba(71,200,255,0.4); box-shadow: 0 4px 16px rgba(26,26,46,0.15); }
.week-cell.selected { background: rgba(71,200,255,0.12); border: 2px solid #47c8ff; }
.week-cell:hover:not(.today):not(.selected) { background: rgba(71,200,255,0.07); }
.week-cell-hdr { text-align: center; margin-bottom: 7px; }
.week-day-name { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #6a6a82; }
.today .week-day-name { color: #e8e8ef; }
.week-day-num { font-size: 22px; font-weight: 700; line-height: 1.2; }
.today .week-day-num { color: #fff; }
.week-month { font-size: 9px; color: #c4b89a; }
.today .week-month { color: #6a6a82; }
.week-empty { font-size: 10px; color: #d1cdc7; text-align: center; }
.today .week-empty { color: #c0c0d0; }
.week-add-btn { display: block; width: 100%; margin-top: 6px; background: none; border: 1px dashed rgba(71,200,255,0.2); border-radius: 5px; font-size: 10px; color: #6a6a82; padding: 3px 0; }
.today .week-add-btn { border-color: rgba(232,213,183,0.3); color: #e8e8ef; }
.week-add-btn:hover { background: rgba(0,0,0,0.03); }
.week-summary { background: #0d0d14; border-radius: 12px; border: 1px solid rgba(71,200,255,0.1); padding: 14px 18px; }
.week-summary-title { font-weight: 700; font-size: 13px; margin-bottom: 10px; }
.week-summary-stats { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 8px; }
.week-stat { font-size: 12px; color: #6a6a82; }
.week-stat-num { font-size: 26px; font-weight: 700; color: #e8e8ef; display: block; line-height: 1; }
.week-summary-cats { display: flex; flex-wrap: wrap; gap: 6px; }
.list-wrap { padding: 12px 24px 24px; }
.list-count { font-size: 12px; color: #6a6a82; margin-bottom: 12px; }
.list-empty { color: #6a6a82; text-align: center; padding: 40px 0; }
.list-date-hdr { font-weight: 700; font-size: 11px; color: #6a6a82; letter-spacing: 2px; text-transform: uppercase; margin: 16px 0 7px; }
.legend { padding: 0 20px 28px; display: flex; flex-wrap: wrap; gap: 5px; }
.legend-item { display: flex; align-items: center; gap: 5px; border-radius: 20px; padding: 3px 10px; }
.legend-item span { font-size: 10px; font-weight: 600; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.notes-section { margin: 4px 16px 32px; background: #0d0d14; border-radius: 16px; border: 1px solid rgba(71,200,255,0.1); overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.notes-header { background: #10101a; padding: 13px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.notes-title-row { display: flex; align-items: center; gap: 10px; }
.notes-title { font-weight: 700; font-size: 15px; color: #fff; }
.notes-badge { background: #47c8ff; color: #e8e8ef; border-radius: 20px; font-size: 11px; font-weight: 700; padding: 2px 8px; }
.notes-filters { display: flex; gap: 5px; }
.notes-filter-btn { background: rgba(255,255,255,0.06); color: #e8e8ef; border: 1px solid rgba(255,255,255,0.06); border-radius: 7px; padding: 4px 11px; font-size: 11px; }
.notes-filter-btn.active { background: #47c8ff; color: #e8e8ef; font-weight: 700; }
.notes-add { padding: 13px 18px; background: rgba(71,200,255,0.04); border-bottom: 1px solid rgba(71,200,255,0.1); }
.notes-input-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.note-input { flex: 1; min-width: 200px; border: 1px solid rgba(255,255,255,0.06); border-radius: 9px; padding: 9px 13px; font-size: 13px; background: #0d0d14; outline: none; }
.note-input:focus { border-color: #c9a96e; }
.btn-add-note { background: #10101a; color: #e8e8ef; border: none; border-radius: 9px; padding: 9px 16px; font-size: 13px; font-weight: 700; white-space: nowrap; }
.btn-add-note:hover { opacity: 0.88; }
.notes-meta-row { display: flex; gap: 8px; flex-wrap: wrap; }
.note-sel { background: #0d0d14; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 5px 10px; font-size: 12px; }
.notes-list { padding: 12px 18px 16px; }
.notes-empty { text-align: center; color: #6a6a82; font-size: 13px; padding: 20px 0; }
.note-card { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; margin-bottom: 6px; border: 1px solid rgba(71,200,255,0.1); border-radius: 10px; transition: all 0.15s; }
.note-card.done { background: #10101a; opacity: 0.65; }
.note-card.pinned { background: #181824bf0; border-color: #e8e8ef; }
.note-check { flex-shrink: 0; margin-top: 2px; width: 18px; height: 18px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.15); background: transparent; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; transition: all 0.15s; }
.note-check.checked { background: #34d399; border-color: #34d399; }
.note-body { flex: 1; min-width: 0; }
.note-text { font-size: 13px; word-break: break-word; }
.note-text.struck { text-decoration: line-through; color: #6a6a82; }
.note-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
.note-cat-badge { font-size: 10px; border-radius: 5px; padding: 1px 7px; font-weight: 600; }
.note-for { font-size: 10px; color: #6a6a82; }
.note-ts { font-size: 10px; color: #c4b89a; }
.note-actions { display: flex; gap: 4px; flex-shrink: 0; }
.note-pin-btn, .note-del-btn { background: none; border: none; font-size: 13px; padding: 2px; }
.note-pin-btn { opacity: 0.3; }
.note-pin-btn.pinned { opacity: 1; }
.note-del-btn { opacity: 0.35; }
.note-del-btn:hover { opacity: 0.8; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
.modal { background: #0d0d14; border-radius: 18px; padding: 24px 24px 18px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.22); }
.modal-title { font-weight: 700; font-size: 17px; margin-bottom: 16px; font-family: 'Playfair Display', Georgia, serif; }
.modal-lbl { display: block; font-size: 11px; font-weight: 700; color: #6a6a82; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; margin-top: 12px; }
.modal-inp { width: 100%; border: 1px solid rgba(255,255,255,0.06); border-radius: 9px; padding: 9px 12px; font-size: 13px; background: #181824; outline: none; }
.modal-inp:focus { border-color: #c9a96e; }
.modal-ta { resize: vertical; min-height: 60px; }
.modal-btns { display: flex; gap: 8px; margin-top: 18px; }
.modal-save { flex: 1; background: #10101a; color: #e8e8ef; border: none; border-radius: 9px; padding: 11px; font-size: 13px; font-weight: 700; }
.modal-save:hover { opacity: 0.88; }
.modal-cancel { background: #10101a; color: #6a6a82; border: 1px solid rgba(255,255,255,0.06); border-radius: 9px; padding: 11px 13px; font-size: 13px; }
.modal-delete { background: rgba(255,71,87,0.1); color: #ff5c5c; border: 1px solid rgba(255,92,92,0.2); border-radius: 9px; padding: 11px 12px; font-size: 13px; }
.time-toggle { display: flex; gap: 8px; margin-top: 4px; }
.time-toggle-btn { flex: 1; padding: 8px; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; font-size: 12px; background: #181824; color: #e8e8ef; transition: all 0.15s; }
.time-toggle-btn.active { background: #10101a; color: #e8e8ef; border-color: #e8e8ef; font-weight: 700; }
.time-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
.time-row input[type=time] { flex: 1; border: 1px solid rgba(255,255,255,0.06); border-radius: 9px; padding: 9px 12px; font-size: 13px; background: #181824; outline: none; }
.time-row input[type=time]:focus { border-color: #c9a96e; }
/* ── Tasks / Requests ── */
.tasks-widget { margin: 0 16px 14px; background: #0d0d14; border-radius: 14px; border: 1px solid rgba(71,200,255,0.1); box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
.tasks-widget-hdr { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; background: #10101a; cursor: pointer; user-select: none; }
.tasks-widget-left { display: flex; align-items: center; gap: 8px; }
.tasks-widget-title { font-size: 13px; font-weight: 700; color: #fff; }
.tasks-badge { background: #47c8ff; color: #e8e8ef; border-radius: 20px; font-size: 11px; font-weight: 700; padding: 2px 8px; }
.tasks-badge.none { background: rgba(255,255,255,0.12); color: #6a6a82; }
.tasks-chevron { color: #e8e8ef; font-size: 12px; transition: transform 0.2s; }
.tasks-chevron.open { transform: rotate(180deg); }
.tasks-body { padding: 10px 14px 12px; }
.tasks-add-row { display: flex; gap: 8px; margin-bottom: 10px; }
.task-input { flex: 1; border: 1px solid rgba(255,255,255,0.06); border-radius: 9px; padding: 8px 12px; font-size: 13px; background: #181824; outline: none; font-family: inherit; }
.task-input:focus { border-color: #c9a96e; }
.task-from-sel { border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 7px 10px; font-size: 12px; background: #0d0d14; font-family: inherit; }
.task-add-btn { background: #10101a; color: #e8e8ef; border: none; border-radius: 9px; padding: 8px 14px; font-size: 12px; font-weight: 700; white-space: nowrap; font-family: inherit; }
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid rgba(71,200,255,0.1); border-radius: 9px; transition: all 0.15s; }
.task-item.done { background: #10101a; opacity: 0.6; }
.task-check { flex-shrink: 0; width: 18px; height: 18px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.15); background: transparent; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; transition: all 0.15s; cursor: pointer; }
.task-check.checked { background: #34d399; border-color: #34d399; }
.task-text { flex: 1; font-size: 13px; }
.task-text.struck { text-decoration: line-through; color: #6a6a82; }
.task-from { font-size: 10px; color: #6a6a82; white-space: nowrap; }
.task-del { background: none; border: none; font-size: 13px; opacity: 0.3; cursor: pointer; padding: 2px; }
.task-del:hover { opacity: 0.8; }
.tasks-empty { font-size: 12px; color: #6a6a82; text-align: center; padding: 8px 0; }
/* Tasks in notes section */
.tasks-section { margin: 0 16px 16px; background: #0d0d14; border-radius: 16px; border: 1px solid rgba(71,200,255,0.1); overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.tasks-section-hdr { background: #0d0d14; padding: 13px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.tasks-section-title { font-weight: 700; font-size: 15px; color: #fff; display: flex; align-items: center; gap: 8px; }
.tasks-filter-row { display: flex; gap: 5px; }
.tasks-filter-btn { background: rgba(255,255,255,0.1); color: #e8e8ef; border: 1px solid rgba(255,255,255,0.06); border-radius: 7px; padding: 4px 11px; font-size: 11px; cursor: pointer; font-family: inherit; }
.tasks-filter-btn.active { background: #47c8ff; color: #e8e8ef; font-weight: 700; }
.tasks-section-add { padding: 13px 18px; background: rgba(71,200,255,0.04); border-bottom: 1px solid rgba(71,200,255,0.1); display: flex; flex-direction: column; gap: 8px; }
.tasks-section-list { padding: 12px 18px 16px; display: flex; flex-direction: column; gap: 6px; }
.day-view-date { text-align: center; padding: 16px 0 20px; }
.day-view-dayname { font-size: 13px; font-weight: 700; color: #6a6a82; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
.day-view-num { font-size: 56px; font-weight: 700; line-height: 1; font-family: 'Playfair Display', Georgia, serif; color: #e8e8ef; }
.day-view-month { font-size: 15px; color: #6a6a82; margin-top: 6px; }
@media (max-width: 640px) {
  html, body { width: 100%; overflow-x: hidden; }
  #app { width: 100%; overflow-x: hidden; }

    function toDS(d)       { return d.toISOString().split("T")[0]; }
    function addDays(ds,n) { const d=new Date(ds+"T12:00:00"); d.setDate(d.getDate()+n); return toDS(d); }
    function wkOf(ds)      { const d=new Date(ds+"T12:00:00"); d.setDate(d.getDate()-d.getDay()); return toDS(d); }
    function dim(y,m)      { return new Date(y,m+1,0).getDate(); }
    function fd(y,m)       { return new Date(y,m,1).getDay(); }
    function esc(s)        { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function fmt12(t)      { if(!t)return""; const [h,m]=t.split(":"); const hr=+h; return `${hr===0?12:hr>12?hr-12:hr}:${m} ${hr<12?"AM":"PM"}`; }
    const TODAY = toDS(new Date());

    function recurs(e,ds) {
      const ev=new Date(e.date+"T12:00:00"),ch=new Date(ds+"T12:00:00");
      if(ch<ev)return false;
      if(e.recurring==="yearly")   return ev.getMonth()===ch.getMonth()&&ev.getDate()===ch.getDate();
      if(e.recurring==="monthly")  return ev.getDate()===ch.getDate();
      if(e.recurring==="weekly")   return ev.getDay()===ch.getDay();
      if(e.recurring==="bimonthly"){if(ev.getDate()!==ch.getDate())return false;return((ch.getFullYear()-ev.getFullYear())*12+(ch.getMonth()-ev.getMonth()))%2===0;}
      if(e.recurring==="biweekly") {if(ev.getDay()!==ch.getDay())return false;return Math.round((ch-ev)/86400000)%14===0;}
      return false;
    }

      jumpMo:new Date().getMonth(), jumpYr:new Date().getFullYear(),

    function getEvs(ds) {
      return S.events.filter(e=>{
        if(S.fCat!=="all"&&e.category!==S.fCat)return false;
        if(S.fMem!=="all"&&e.member!==S.fMem)return false;
        // Multi-day: check if ds falls within date range
        if(e.endDate && e.endDate > e.date) {
          if(ds >= e.date && ds <= e.endDate) return true;
        }
        if(e.date===ds)return true;
        if(e.recurring==="none")return false;
        // Skip recurring on days covered by exceptions
        if((e.exceptions||[]).includes(ds)) return false;
        return recurs(e,ds);
      }).sort((a,b)=>{
        if(a.allDay&&!b.allDay)return -1;
        if(!a.allDay&&b.allDay)return 1;
        return (a.time||"").localeCompare(b.time||"");
      });
    }

    // Get multi-day span position for a given event on a given day
    function getSpan(ev, ds) {
      if(!ev.endDate || ev.endDate <= ev.date) return null;
      if(ds === ev.date) return "start";
      if(ds === ev.endDate) return "end";
      if(ds > ev.date && ds < ev.endDate) return "mid";
      return null;
    }

    function saveTask(task)  { set(ref(db,`tasks/${task.id}`),task); }
    function deleteTask(id)  { remove(ref(db,`tasks/${id}`)); }
    function patchTask(id,ch){ update(ref(db,`tasks/${id}`),ch); }

      else{S.events=Object.values(val);}
      S.synced=true;render();
    });
    onValue(ref(db,"notes"),snap=>{
      const val=snap.val();
      S.notes=val?Object.values(val).sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)):[];

        S.synced=true;
        render();
        console.warn("Firebase timeout — loaded seed data as fallback");

    // ── ICS Calendar Invite Generator ────────────────────────────
    function formatICSDate(ds, time, allDay) {
      const d = new Date(ds + "T12:00:00");
      if (allDay) {
        return d.toISOString().replace(/-/g,"").split("T")[0];
      }
      if (time) {
        const [h,m] = time.split(":");
        const dt = new Date(ds + `T${h.padStart(2,"0")}:${m.padStart(2,"0")}:00`);
        return dt.toISOString().replace(/[-:]/g,"").replace(".000","");
      }
      return d.toISOString().replace(/[-:]/g,"").replace(".000","");
    }

    function generateICS(ev) {
      const uid = ev.id + "@pratt-hub.calendar";
      const now = new Date().toISOString().replace(/[-:]/g,"").replace(".000","");
      const dtstart = ev.allDay
        ? `DTSTART;VALUE=DATE:${formatICSDate(ev.date, null, true)}`
        : `DTSTART:${formatICSDate(ev.date, ev.time, false)}`;
      const dtend = ev.endDate && ev.endDate > ev.date
        ? (ev.allDay
          ? `DTEND;VALUE=DATE:${formatICSDate(ev.endDate, null, true)}`
          : `DTEND:${formatICSDate(ev.endDate, ev.time, false)}`)
        : (ev.allDay
          ? `DTEND;VALUE=DATE:${formatICSDate(ev.date, null, true)}`
          : `DTEND:${formatICSDate(ev.date, ev.time, false)}`);
      const loc  = ev.location ? `LOCATION:${ev.location}` : "";
      const desc = ev.notes    ? `DESCRIPTION:${ev.notes.replace(/\n/g,"\\n")}` : "";
      const attendees = (ev.invitees||"").split(",").map(e=>e.trim()).filter(Boolean)
        .map(e=>`ATTENDEE;RSVP=TRUE:mailto:${e}`).join("\r\n");

      return [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Pratt Hub//Family Calendar//EN",
        "CALSCALE:GREGORIAN",
        "METHOD:REQUEST",
        "BEGIN:VEVENT",
        `UID:${uid}`,
        `DTSTAMP:${now}`,
        dtstart,
        dtend,
        `SUMMARY:${ev.title}`,
        loc,desc,attendees,
        "STATUS:CONFIRMED",
        "END:VEVENT",
        "END:VCALENDAR"
      ].filter(Boolean).join("\r\n");
    }

    function sendInvite(ev) {
      const emails = (ev.invitees||"").split(",").map(e=>e.trim()).filter(Boolean);
      if (!emails.length) return;

      // Download .ics file
      const ics = generateICS(ev);
      const blob = new Blob([ics], {type:"text/calendar;charset=utf-8"});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url;
      a.download = `${ev.title.replace(/[^a-z0-9]/gi,"-")}.ics`;
      a.click();
      URL.revokeObjectURL(url);

      // Open mailto with pre-filled subject and body
      const dateStr = new Date(ev.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
      const timeStr = ev.allDay ? "All day" : (ev.time ? fmt12(ev.time) : "");
      const body = [
        `You're invited to: ${ev.title}`,
        `Date: ${dateStr}`,
        timeStr ? `Time: ${timeStr}` : "",
        ev.location ? `Location: ${ev.location}` : "",
        ev.notes ? `Notes: ${ev.notes}` : "",
        "",
        "A calendar file (.ics) has been downloaded — attach it to this email so the recipient can add it to their calendar.",
      ].filter(Boolean).join("\n");

      const mailto = `mailto:${emails.join(",")}?subject=${encodeURIComponent("Invite: "+ev.title)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
    }

    function bind(){

      $("btnPrev")?.addEventListener("click",()=>{
        S.showJump=false;
        if(S.view==="day") S.sel=addDays(S.sel||TODAY,-1);

      $("btnSave")?.addEventListener("click",()=>{

            exceptionOf:S.editEv.id,
          };
          const origExceptions=[...(S.editEv.exceptions||[]),S.editOccurrenceDate];
          update(ref(db,`events/${S.editEv.id}`),{exceptions:origExceptions});
          saveEvent(exceptEv);
          // Auto-send invite if emails provided
          if(invitees) setTimeout(()=>sendInvite(exceptEv),300);
        } else {
          const ev={...S.form,title,date,endDate,allDay,time,location,invitees,
            category:$("mCat").value,member:$("mMem").value,
            recurring:$("mRec")?.value||S.form.recurring,
            notes:$("mNotes").value,
            id:S.editEv?S.editEv.id:"e_"+Date.now()};
          saveEvent(ev);
          // Auto-send invite if emails provided
          if(invitees) setTimeout(()=>sendInvite(ev),300);
        }
        S.modal=null;S.editEv=null;S.recurEditMode=null;S.editOccurrenceDate=null;render();
      });
      $("btnCancel")?.addEventListener("click",()=>{S.modal=null;S.editEv=null;S.recurEditMode=null;render();});
      $("btnSendInvite")?.addEventListener("click",()=>{ if(S.editEv) sendInvite(S.editEv); });
      $("btnDelete")?.addEventListener("click",()=>{
        if(!S.editEv) return;
        if(S.recurEditMode==="this" && S.editOccurrenceDate){
          // Delete only this occurrence — add to exceptions array
          const origExceptions=[...(S.editEv.exceptions||[]),S.editOccurrenceDate];
          update(ref(db,`events/${S.editEv.id}`),{exceptions:origExceptions});
          S.editEv.exceptions = origExceptions;
        } else {
          // Delete the entire event (all occurrences)
          deleteEvent(S.editEv.id);
        }
        S.modal=null;S.editEv=null;S.recurEditMode=null;S.editOccurrenceDate=null;render();
      });
      $("modalOverlay")?.addEventListener("click",e=>{if(e.target.id==="modalOverlay"){S.modal=null;render();}});
      const ni=$("noteInput");
      if(ni){ni.addEventListener("input",e=>S.nText=e.target.value);ni.addEventListener("keydown",e=>{if(e.key==="Enter")addNote();});}
      $("nFor")?.addEventListener("change",e=>S.nFor=e.target.value);
      $("nCat")?.addEventListener("change",e=>S.nCat=e.target.value);
      $("btnAddNote")?.addEventListener("click",addNote);
      // ── Task handlers ──
      $("btnAddTaskFull")?.addEventListener("click",()=>{
        const txt=($("taskInputFull")?.value||S.tText).trim();
        if(!txt)return;
        const task={id:"t_"+Date.now(),text:txt,from:S.tFrom,done:false,ts:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})};
        // Optimistically add to local state immediately — don't wait for Firebase onValue
        S.tasks.unshift(task);
        saveTask(task);
        S.tText="";
        if($("taskInputFull"))$("taskInputFull").value="";
        render();
      });
      $("taskInputFull")?.addEventListener("input",e=>S.tText=e.target.value);
      // From toggles in full section
      document.querySelectorAll("[data-tfrom]").forEach(b=>b.addEventListener("click",()=>{S.tFrom=b.dataset.tfrom;render();}));
      // Filter
      document.querySelectorAll("[data-tfilt]").forEach(b=>b.addEventListener("click",()=>{S.tFilt=b.dataset.tfilt;render();}));
      // Check/uncheck tasks — optimistic update
      document.querySelectorAll(".task-check").forEach(b=>b.addEventListener("click",()=>{
        const t=S.tasks.find(x=>x.id===b.dataset.tid);
        if(t){ t.done=!t.done; patchTask(t.id,{done:t.done}); render(); }
      }));
      // Delete tasks — optimistic update
      document.querySelectorAll(".task-del").forEach(b=>b.addEventListener("click",()=>{
        S.tasks=S.tasks.filter(t=>t.id!==b.dataset.tid);
        deleteTask(b.dataset.tid);
        render();
      }));
      document.querySelectorAll(".notes-filter-btn").forEach(b=>b.addEventListener("click",()=>{S.nFilt=b.dataset.nfilt;render();}));
      document.querySelectorAll(".note-check").forEach(b=>b.addEventListener("click",()=>{const n=S.notes.find(x=>x.id===b.dataset.nid);if(n)patchNote(n.id,{done:!n.done});}));
      document.querySelectorAll(".note-pin-btn").forEach(b=>b.addEventListener("click",()=>{const n=S.notes.find(x=>x.id===b.dataset.nid);if(n)patchNote(n.id,{pinned:!n.pinned});}));
      document.querySelectorAll(".note-del-btn").forEach(b=>b.addEventListener("click",()=>deleteNote(b.dataset.nid)));
    }

    function openAdd(ds){S.editEv=null;S.recurEditMode=null;S.editOccurrenceDate=null;S.form={title:"",date:ds||TODAY,endDate:"",category:"errand",member:"Both of Us",recurring:"none",notes:"",allDay:true,time:"",location:"",invitees:""};S.modal="add";render();}
    function addNote(){
      const ni=document.getElementById("noteInput");
      const text=(ni?.value||S.nText).trim();
      if(!text)return;
      const note={id:"n_"+Date.now(),text,for:S.nFor,cat:S.nCat,done:false,pinned:false,ts:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})};
      saveNote(note);S.nText="";if(ni)ni.value="";
    }
  </script>
</body>
</html>
